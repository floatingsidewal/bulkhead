services:
  # HTTP REST server on port 3000
  bulkhead:
    build: .
    ports:
      - "3000:3000"
    environment:
      - BULKHEAD_PORT=3000
      - BULKHEAD_HOST=0.0.0.0
      - BULKHEAD_LOG_LEVEL=info
      - BULKHEAD_CASCADE_MODEL_ENABLED=false
      # Uncomment to enable LLM provider:
      # - BULKHEAD_LLM_PROVIDER=anthropic
      # - BULKHEAD_LLM_API_KEY=${BULKHEAD_LLM_API_KEY}
    volumes:
      - bert-models:/app/models
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

  # MCP server on stdio (for use with AI coding assistants)
  # Usage: docker compose run --rm -i bulkhead-mcp
  bulkhead-mcp:
    build: .
    command: ["packages/server/dist/mcp/index.js"]
    stdin_open: true
    volumes:
      - bert-models:/app/models
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

volumes:
  bert-models:
