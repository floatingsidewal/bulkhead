name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit -p packages/core/tsconfig.json
      - run: npx tsc --noEmit -p packages/server/tsconfig.json

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Core unit tests
        run: npm test --workspace=packages/core
      - name: Server integration tests
        run: npm test --workspace=packages/server

  build:
    name: Build & Publish npm
    runs-on: ubuntu-latest
    needs: [lint, test]
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://npm.pkg.github.com
      - run: npm ci
      - name: Build core
        run: cd packages/core && npx tsup
      - name: Build server
        run: cd packages/server && npx tsup
      - name: Publish @bulkhead/core
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: npm publish --workspace=@bulkhead/core --access public --no-git-checks || echo "Version already published, skipping"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish @bulkhead/server
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: npm publish --workspace=@bulkhead/server --access public --no-git-checks || echo "Version already published, skipping"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [lint, test]
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t bulkhead:ci .

      - name: Smoke test — HTTP mode
        run: |
          docker run -d --name bulkhead-ci -p 3000:3000 bulkhead:ci
          sleep 3
          curl -sf http://localhost:3000/healthz | grep -q '"ok"'
          curl -sf -X POST http://localhost:3000/v1/scan \
            -H "Content-Type: application/json" \
            -d '{"text":"SSN: 219-09-9999"}' | grep -q '"US_SSN"'
          docker stop bulkhead-ci
          docker rm bulkhead-ci

      - name: Smoke test — MCP mode
        run: |
          echo '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"1.0"}}}' \
            | docker run --rm -i bulkhead:ci packages/server/dist/mcp/index.js \
            | grep -q '"bulkhead"'

      - name: Verify non-root user
        run: |
          docker run --rm bulkhead:ci /usr/bin/whoami | grep -q bulkhead

      - name: Log in to GitHub Container Registry
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push to ghcr.io
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          VERSION=$(node -p "require('./package.json').version")
          docker tag bulkhead:ci ghcr.io/${{ github.repository }}:${VERSION}
          docker tag bulkhead:ci ghcr.io/${{ github.repository }}:latest
          docker push ghcr.io/${{ github.repository }}:${VERSION}
          docker push ghcr.io/${{ github.repository }}:latest
