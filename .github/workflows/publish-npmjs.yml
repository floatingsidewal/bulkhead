name: Publish to npmjs.org

on:
  workflow_dispatch:
    branches: [main]

permissions:
  id-token: write
  contents: write

jobs:
  publish:
    name: Build & Publish to npmjs.org
    runs-on: ubuntu-latest
    environment: default
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          # No registry-url or always-auth — trusted publishing uses OIDC

      - run: npm install -g npm@latest
      - run: npm ci

      - name: Build core
        run: cd packages/core && npx tsup
      - name: Build server
        run: cd packages/server && npx tsup

      # Clean any .npmrc files so npm uses pure OIDC
      - name: Clean all .npmrc files
        run: rm -f ~/.npmrc .npmrc packages/core/.npmrc packages/server/.npmrc

      - name: Publish @bulkhead-ai/core
        run: |
          cd packages/core
          node -e "
            const p=require('./package.json');
            p.name='@bulkhead-ai/core';
            delete p.publishConfig;
            require('fs').writeFileSync('package.json',JSON.stringify(p,null,2)+'\n');
          "
          npm publish --provenance --access public || echo "Version already published, skipping"

      - name: Publish @bulkhead-ai/server
        run: |
          cd packages/server
          node -e "
            const p=require('./package.json');
            p.name='@bulkhead-ai/server';
            p.dependencies['@bulkhead-ai/core']=p.dependencies['@floatingsidewal/bulkhead-core'];
            delete p.dependencies['@floatingsidewal/bulkhead-core'];
            delete p.publishConfig;
            require('fs').writeFileSync('package.json',JSON.stringify(p,null,2)+'\n');
          "
          npm publish --provenance --access public || echo "Version already published, skipping"
