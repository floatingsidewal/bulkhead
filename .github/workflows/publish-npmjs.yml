name: Publish to npmjs.org

on:
  workflow_dispatch:
    branches: [main]

jobs:
  publish:
    name: Build & Publish to npmjs.org
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build core
        run: cd packages/core && npx tsup
      - name: Build server
        run: cd packages/server && npx tsup
      - name: Configure npmjs.org auth
        run: |
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > ~/.npmrc
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish @floatingsidewal/bulkhead-core
        run: |
          cd packages/core
          npm publish --registry=https://registry.npmjs.org --no-git-checks || echo "Version already published, skipping"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish @floatingsidewal/bulkhead-server
        run: |
          cd packages/server
          npm publish --registry=https://registry.npmjs.org --no-git-checks || echo "Version already published, skipping"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
