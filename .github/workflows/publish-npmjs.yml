name: Publish to npmjs.org

on:
  workflow_dispatch:
    branches: [main]

jobs:
  publish:
    name: Build & Publish to npmjs.org
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'
          scope: '@floatingsidewal'
      - run: npm ci
      - name: Build core
        run: cd packages/core && npx tsup
      - name: Build server
        run: cd packages/server && npx tsup

      - name: Publish @floatingsidewal/bulkhead-core
        working-directory: packages/core
        run: |
          node -e "const p=require('./package.json'); delete p.publishConfig.registry; require('fs').writeFileSync('package.json',JSON.stringify(p,null,2)+'\n')"
          npm publish --access public || echo "Version already published, skipping"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @floatingsidewal/bulkhead-server
        working-directory: packages/server
        run: |
          node -e "const p=require('./package.json'); delete p.publishConfig.registry; require('fs').writeFileSync('package.json',JSON.stringify(p,null,2)+'\n')"
          npm publish --access public || echo "Version already published, skipping"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
