name: Publish to npmjs.org

on:
  workflow_dispatch:
    branches: [main]

jobs:
  publish:
    name: Build & Publish to npmjs.org
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'
          scope: '@floatingsidewal'
      - run: npm ci
      - name: Build core
        run: cd packages/core && npx tsup
      - name: Build server
        run: cd packages/server && npx tsup

      # Override publishConfig.registry so npm publishes to npmjs.org instead of GitHub Packages
      - name: Patch publishConfig for npmjs.org
        run: |
          for pkg in packages/core/package.json packages/server/package.json; do
            node -e "const p=require('./$pkg'); p.publishConfig={access:'public'}; require('fs').writeFileSync('$pkg',JSON.stringify(p,null,2)+'\n')"
          done

      - name: Publish @floatingsidewal/bulkhead-core
        run: npm publish --workspace=@floatingsidewal/bulkhead-core --no-git-checks || echo "Version already published, skipping"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish @floatingsidewal/bulkhead-server
        run: npm publish --workspace=@floatingsidewal/bulkhead-server --no-git-checks || echo "Version already published, skipping"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
