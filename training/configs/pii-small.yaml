# Bulkhead PII Model Training Configuration
# Fine-tunes a small BERT model for PII token classification.
#
# Usage: python train.py --config configs/pii-small.yaml

base_model: "gravitee-io/bert-small-pii-detection"
output_dir: "../models/pii-small"

# Training hyperparameters
epochs: 3
batch_size: 16
learning_rate: 5.0e-5
weight_decay: 0.01
warmup_ratio: 0.1
max_seq_length: 512

# Dataset
dataset: "ai4privacy/pii-masking-400k"
train_split: "train"
eval_split: "validation"

# Export
quantize: "int8"  # Options: fp32, fp16, int8, q4
export_onnx: true

# Entity types to detect (subset of the full model vocabulary)
entity_types:
  - PERSON
  - LOCATION
  - ORGANIZATION
  - EMAIL
  - PHONE_NUM
  - CREDIT_CARD
  - CRYPTO
  - DATE_TIME
  - IP_ADDRESS
  - MAC_ADDRESS
  - IBAN_CODE
  - US_SSN
  - US_PASSPORT
  - UK_NHS
  - MEDICAL_LICENSE
  - USERNAME
  - PASSWORD
  - URL
  - STREET_ADDRESS
  - POSTCODE
  - BANK_ACCOUNT
  - DRIVERS_LICENSE
  - TAX_ID
  - NATIONAL_ID
